{{- /*
  The Grafana app (apps/grafana) runs the dashboard sidecar with
  searchNamespace: ALL, so any ConfigMap labelled `grafana_dashboard`
  is auto-imported regardless of namespace. These dashboards are hand-built
  against the windows_exporter (:9182) and nvidia_gpu_exporter (:9835)
  metrics scraped from oliver-win on the tailnet.
*/}}
{{- range $path, $_ := .Files.Glob "dashboards/*.json" }}
{{- $name := base $path | trimSuffix ".json" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: monitoring-dashboard-{{ $name }}
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: monitoring
  annotations:
    grafana_folder: "Gaming"
data:
  {{ base $path }}: |-
{{ $.Files.Get $path | indent 4 }}
{{- end }}
