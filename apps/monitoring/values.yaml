kube-prometheus-stack:
  # NOTE: These must be set manually to the control plane IP addresses
  kubeEtcd:
    endpoints:
      - 100.84.34.65
      - 100.111.147.106
      - 100.122.154.112
  kubeControllerManager:
    service:
      selector:
        k8s-app: kube-controller-manager
  kubeScheduler:
    service:
      selector:
        k8s-app: kube-scheduler
  alertmanager:
    ingress:
      enabled: true
      ingressClassName: "nginx"
      annotations:
        external-dns.alpha.kubernetes.io/target: "tunnel.2411.house"
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
      hosts:
        - alert-manager.2411.house
    alertmanagerspec:
      storage:
        volumeClaimTemplate:
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 10Gi
  prometheus:
    ingress:
      enabled: true
      ingressClassName: "nginx"
      annotations:
        external-dns.alpha.kubernetes.io/target: "tunnel.2411.house"
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
      hosts:
        - prom.2411.house
    monitor:
      attachMetadata:
        node: true
      relabelings:
        - action: replace
          sourceLabels:
            - __meta_kubernetes_node_name
          targetLabel: node
    prometheusSpec:
      additionalScrapeConfigs:
        - job_name: oliver-win
          metrics_path: /metrics
          static_configs:
            # oliver-win on the tailnet. CoreDNS has no ts.net stub zone, so the
            # MagicDNS name does not resolve in-cluster; use the stable tailnet IP.
            - targets:
                - 100.106.71.5:9182
                - 100.106.71.5:9835
              labels:
                instance: oliver-win
      ruleSelectorNilUsesHelmValues: false
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      probeSelectorNilUsesHelmValues: false
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 150Gi
  grafana:
    enabled: false
    forceDeployDatasources: true
    forceDeployDashboards: true
