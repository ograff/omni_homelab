openclaw:
  configMode: merge

  controllers:
    main:
      containers:
        main:
          env:
            TZ: America/Los_Angeles
          envFrom:
            - secretRef:
                name: openclaw-env-secret

  service:
    main:
      controller: main
      ports:
        gateway:
          port: 18789
    tailscale:
      controller: main
      type: LoadBalancer
      loadBalancerClass: tailscale
      ports:
        gateway:
          port: 18789

  ingress:
    main:
      enabled: true
      className: nginx
      annotations:
        external-dns.alpha.kubernetes.io/target: "tunnel.2411.house"
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
      hosts:
        - host: openclaw.2411.house
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: gateway

  configMaps:
    config:
      data:
        openclaw.json: |
          {
            "gateway": {
              "port": 18789,
              "mode": "local",
              "trustedProxies": ["10.0.0.1"],
              "controlUi": {
                "allowedOrigins": [
                  "https://openclaw.2411.house"
                ]
              }
            }
          }

  persistence:
    data:
      enabled: true
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 5Gi
