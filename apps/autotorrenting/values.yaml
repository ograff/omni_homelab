qbit:
  image:
    # -- image repository
    repository: lscr.io/linuxserver/qbittorrent
    # -- image pull policy
    pullPolicy: IfNotPresent
    # -- image tag
    tag: 5.1.4
  sidecars:
    qbittorrent-exporter:
      image: martabal/qbittorrent-exporter:latest
      ports:
        - name: metrics
          containerPort: 8000
          protocol: TCP
      env:
        - name: QBITTORRENT_HOST
          value: "http://localhost:8080"  # qBittorrent web UI port
        - name: QBITTORRENT_USERNAME
          value: "admin"  # Change to your qBittorrent username
        - name: QBITTORRENT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: qbittorrent-secret  # You'll need to create this secret
              key: password
        - name: EXPORTER_PORT
          value: "8000"
        - name: EXPORTER_LOG_LEVEL
          value: "INFO"
      resources:
        limits:
          cpu: 400m
          memory: 128Mi
        requests:
          cpu: 200m
          memory: 64Mi
  env:
    TZ: America/Los_Angeles
    DOCKER_MODS: ghcr.io/vuetorrent/vuetorrent-lsio-mod:latest
  service:
    main:
      ports:
        http:
          port: 8080
        metrics:
          port: 8000
          targetPort: 8000

    bittorrent:
      type: NodePort
      enabled: true
      ports:
        bittorrent:
          enabled: true
          port: 51413
          nodePort: 30400
          protocol: TCP
  persistence:
    config:
      enabled: true
      size: 10Gi
    downloads:
      enabled: true
      type: pvc
      existingClaim: downloads
      size: 90Gi
    media:
      enabled: true
      mountPath: /mnt/media_and_torrents
      type: pvc
      existingClaim: torrent-pvc
    vuetorrent:
      enabled: true
      type: emptyDir

  ingress:
    main:
      ## @param ingress.enabled Enable ingress record generation
      enabled: true
      ## @param ingress.className IngressClass that will be be used to implement the Ingress
      ingressClassName: "nginx"

      ## @param ingress.annotations [object] Additional annotations for the Ingress resource.
      annotations:
        external-dns.alpha.kubernetes.io/target: "tunnel.2411.house"
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
        hajimari.io/appName: Qbit
        nginx.ingress.kubernetes.io/proxy-body-size: "0"

      ## @param ingress.hosts [object] An array with ingress host objects, under which service should be reachable
      hosts:
        - host: &qbit_host qbit.2411.house
          paths:
            - path: /
              pathType: Prefix
  serviceMonitor:
    main:
      enabled: true
      endpoints:
        - port: metrics
          path: /metrics
          interval: 30s
          scrapeTimeout: 10s
      labels:
        release: prometheus  # Match your Prometheus operator labels
      serviceName: "{{ include \"bjw-s.common.lib.chart.names.fullname\" $ }}"
cross-seed:
  # See reference documentation at https://github.com/trueforge-org/truecharts/blob/master/charts/library/common/values.yaml

  global:
    resources:
      limits:
        memory: 1000Mi
      requests:
        cpu: 75m
        memory: 200Mi

#  image:
#    repository: ghcr.io/cross-seed/cross-seed
#    pullPolicy: IfNotPresent
#    tag: 6.13.6

  fallbackDefaults:
    probeType: tcp

  service:
    main:
      ports:
        main:
          port: 2468

  workload:
    main:
      strategy: Recreate
      podSpec:
        containers:
          main:
            command:
              - "/usr/bin/catatonit"
              - "--"
              - "/usr/local/bin/cross-seed"
              - daemon
  #            - --verbose
            probes:
              liveness:
                type: tcp
              readiness:
                type: tcp
              startup:
                type: tcp

  configmap:
    crossseed-config:
      enabled: true
      data:
        config.js: |
          module.exports = {
            verbose: true,
            delay: 60,
            outputDir: null,
            linkDirs: ["/mnt/media_and_torrents/_linkdirs"],
            linkType: "hardlink",
            action: "inject",
            matchMode: "partial",
            skipRecheck: true,
            sonarr: ["http://autotorrenting-sonarr:8989/?apikey=9c3dda0b9b044cce8db8bfa5ddc7b9d3"],
            radarr: ["http://autotorrenting-radarr:7878/?apikey=692ddba0e56645f0a72a134f1f5cb7b5"],
            includeSingleEpisodes: true,
            fuzzySizeThreshold: 0.02,
            torznab: [
                "http://autotorrenting-jackett:9117/api/v2.0/indexers/torrentleech/results/torznab/api?apikey=f30nr726gk531e1xa06u1sla0jr4709p&t=search&cat=&q=",
                "http://autotorrenting-jackett:9117/api/v2.0/indexers/seedpool-api/results/torznab/api?apikey=f30nr726gk531e1xa06u1sla0jr4709p&t=search&cat=&q="
            ],
            torrentClients: [
                "qbittorrent:http://admin:changeme@autotorrenting-qbit:8080",
            ],
            useClientTorrents: true,
            excludeOlder: "2 weeks",
            excludeRecentSearch: "3 days",
            searchLimit: 150,
            searchCadence: "1d",
          };

  persistence:
    config:
      enabled: true
      mountPath: /config
      readOnly: false
      size: 1Gi

    crossseed-config-file:
      enabled: true
      type: configmap
      objectName: crossseed-config
      mountPath: /config/config.js
      subPath: config.js
      readOnly: true
      items:
        - key: config.js
          path: config.js

    media:
      enabled: true
      mountPath: /mnt/media_and_torrents
      type: pvc
      existingClaim: torrent-pvc
