teslamate:
  image:
    repository: teslamate/teslamate
    tag: &teslamateTag "4.0.1"
  timeZone: America/Los_Angeles

  virtualHost: teslamate.2411.house

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      external-dns.alpha.kubernetes.io/target: "tunnel.2411.house"
      external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    hosts:
      - &host teslamate.2411.house
    tls:
      - secretName: teslamate-tls-secret
        hosts:
          - *host

  # Use external CNPG PostgreSQL cluster
  remotePostgresql:
    enabled: true
    host: teslamate-pg-rw
    database: teslamate

  # Load CNPG secret and alias keys to what TeslaMate expects
  envFromSecrets:
    - name: teslamate-pg-app
    - name: teslamate-encryption-key

  env:
    DATABASE_USER: "$(username)"
    DATABASE_PASS: "$(password)"

  grafana:
    env:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      # Consumed by the datasource.yml baked into the teslamate/grafana image
      DATABASE_HOST: teslamate-pg-ro
      DATABASE_PORT: "5432"
      DATABASE_NAME: teslamate
      DATABASE_SSL_MODE: disable
    # Map CNPG secret keys to the names the default datasource.yml expects
    envValueFrom:
      DATABASE_USER:
        secretKeyRef:
          name: teslamate-pg-app
          key: username
      DATABASE_PASS:
        secretKeyRef:
          name: teslamate-pg-app
          key: password
    persistence:
      enabled: false
    image:
      repository: teslamate/grafana
      tag: *teslamateTag
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        external-dns.alpha.kubernetes.io/target: "tunnel.2411.house"
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
      hosts:
        - &grafanaHost teslagraph.2411.house
      tls:
        - secretName: teslagraph-tls-secret
          hosts:
            - *grafanaHost